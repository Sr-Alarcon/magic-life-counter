<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<title>Guille: The Gathering</title>
<meta name="theme-color" content="#0b0712" />
<link rel="manifest" href="manifest.webmanifest" />
<link rel="apple-touch-icon" href="icons/icon-180.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Guille TG" />
<style>
@font-face{
  font-family:'Cinzel';
  src:url('cinzel.ttf') format('truetype');
  font-display:swap;
}
:root{
  --bg:#0b0712; --surface:#1a1424; --surface2:#2a2238;
  --text:#ede7f6; --muted:#b3a9c9; --primary:#b39dff;
  --warn:#ff6b6b;
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent; -webkit-user-select:none; user-select:none;}
html,body{margin:0; padding:0; height:100%; background:var(--bg); color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; overscroll-behavior:none;}
body{position:fixed; inset:0; overflow:hidden;}
#bg{position:fixed; inset:0; z-index:-2;
  background:
    radial-gradient(60% 50% at 16% 10%, rgba(126,63,242,.30), transparent 70%),
    radial-gradient(55% 45% at 92% 28%, rgba(59,91,219,.24), transparent 70%),
    radial-gradient(60% 50% at 78% 94%, rgba(155,47,174,.22), transparent 70%),
    radial-gradient(45% 40% at 8% 82%, rgba(30,136,229,.14), transparent 70%),
    linear-gradient(#150d24,#060409);
}
#vig{position:fixed; inset:0; z-index:-1; pointer-events:none;
  background:radial-gradient(120% 120% at 50% 50%, transparent 55%, rgba(5,3,8,.82));}
#stars{position:fixed; inset:0; z-index:-1; pointer-events:none;}
#app{position:fixed; inset:0; z-index:1;}

.screen{position:absolute; inset:0; overflow-y:auto; -webkit-overflow-scrolling:touch; padding:20px;
  padding-top:max(20px, env(safe-area-inset-top)); padding-bottom:max(24px, env(safe-area-inset-bottom));}
.htitle{font-family:'Cinzel',serif; font-size:30px; line-height:1.1;}
.htitle.big{font-size:42px; font-weight:700; color:var(--primary); margin-bottom:6px;}
.sub{color:var(--muted); font-style:italic; font-size:14px; margin-bottom:18px;}
.sect{color:var(--muted); text-transform:uppercase; font-size:12px; letter-spacing:1px; margin:18px 0 8px;}
.muted{color:var(--muted); font-size:12.5px; margin-bottom:8px;}
.card2{background:rgba(26,20,36,.72); border-radius:20px; padding:18px; margin-bottom:12px;}
.modename{font-family:'Cinzel',serif; font-size:22px; font-weight:600;}
.modesub{color:var(--muted); font-size:13px; margin-top:4px;}
.rowbtns{display:flex; gap:8px; margin-top:8px; align-items:center;}
.rowbtns .spacer{flex:1;}
.addcard{background:rgba(42,34,56,.72); border-radius:20px; padding:18px; font-weight:600; margin-bottom:12px;}
.foot{color:#5a5070; font-size:11px; text-align:center; margin-top:18px;}
.players{display:flex; flex-direction:column;}
.prow{display:flex; align-items:center; padding:6px 0;}
.dot{width:26px; height:26px; border-radius:50%; border:2px solid rgba(255,255,255,.3); flex:0 0 auto;}
.prow .pname{flex:1; margin-left:12px; font-size:16px; font-weight:500;}
.link{color:var(--primary); font-weight:600; padding:6px 8px;}
button{font-family:inherit; color:var(--text); border:none; border-radius:14px; background:var(--surface2);
  padding:12px 14px; font-size:15px; }
button.primary{background:var(--primary); color:#231539; font-weight:700;}
button.ghost{background:transparent; border:1px solid #4a4060;}
button.wide{display:block; width:100%; margin-top:10px;}
button:disabled{opacity:.4;}

/* seats */
.seat{display:flex; align-items:center; background:rgba(26,20,36,.72); border-radius:18px; padding:14px; margin-bottom:10px;}
.seatinfo{flex:1; margin-left:14px;}
.seatname{font-size:17px; font-weight:600;}
.seat .dot{width:28px; height:28px;}

/* dialogs */
.backdrop{position:fixed; inset:0; z-index:50; background:rgba(0,0,0,.65); display:flex; align-items:center; justify-content:center; padding:20px;}
.card{background:#211a2e; border-radius:24px; padding:20px; width:100%; max-width:380px; max-height:84vh; overflow-y:auto;}
.card h3{margin:0 0 12px; font-size:20px;}
.field{display:flex; align-items:center; margin:12px 0;}
.field label{flex:1; font-size:15px;}
.field .val{min-width:48px; text-align:center; font-size:20px; font-weight:700;}
.stepbtn{width:46px; height:46px; border-radius:50%; padding:0; font-size:22px; background:var(--surface2);}
.toggle{display:flex; align-items:center; justify-content:space-between; margin:12px 0;}
.toggle .t-title{font-size:15px;} .toggle .t-sub{font-size:12px; color:var(--muted);}
.sw{width:50px; height:30px; border-radius:16px; background:#3a3450; position:relative; transition:.15s;}
.sw.on{background:var(--primary);}
.sw::after{content:''; position:absolute; top:3px; left:3px; width:24px; height:24px; border-radius:50%; background:#fff; transition:.15s;}
.sw.on::after{left:23px;}
input[type=text]{font-family:inherit; width:100%; padding:12px; border-radius:12px; border:1px solid #4a4060;
  background:#15101f; color:var(--text); font-size:16px;}
.swatches{display:grid; grid-template-columns:repeat(5,1fr); gap:12px; justify-items:center;}
.swatch{width:44px; height:44px; border-radius:50%; border:1px solid rgba(255,255,255,.25);}
.swatch.sel{border:3px solid #fff;}
.pickrow{display:flex; align-items:center; padding:10px 0;}
.pickrow .pname{margin-left:12px; font-size:16px;}
.dlgrow{display:flex; gap:10px; margin-top:14px;}
.dlgrow button{flex:1;}
hr{border:none; border-top:1px solid #3a3450; margin:12px 0;}

/* GAME */
.board{position:absolute; inset:0; display:flex; flex-direction:column; padding:4px;}
.brow{flex:1; display:flex;}
.tile{position:relative; flex:1; margin:4px; border-radius:22px; overflow:hidden;
  container-type:size; border:1px solid; }
.tile.rot{transform:rotate(180deg);}
.tileInner{position:absolute; inset:0; display:flex; flex-direction:column; padding:10px;}
.thead{display:flex; align-items:center; height:24px;}
.crown{flex:1; font-size:16px;}
.dots{font-size:20px; padding:2px 10px; font-weight:700;}
.tbody{position:relative; flex:1;}
.zone{position:absolute; top:0; bottom:0; width:50%; touch-action:none; display:flex; align-items:center;}
.zone.minus{left:0; justify-content:flex-start;}
.zone.plus{right:0; justify-content:flex-end;}
.zone .sign{font-size:34px; opacity:.5; padding:0 6px;}
.center{position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; pointer-events:none;}
.life{font-weight:800; line-height:1; color:var(--text);
  font-size:clamp(34px, min(46cqh, 52cqw), 165px);}
.delta{font-weight:800; min-height:1.1em; font-size:clamp(13px,min(13cqh,15cqw),30px);}
.pname{font-family:'Cinzel',serif; font-weight:700; max-width:96%; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
  font-size:clamp(12px, min(12cqh,16cqw), 34px); margin-top:2px;}
.chips{display:flex; gap:10px; font-size:13px; color:var(--muted); min-height:18px;}
.panel{position:absolute; inset:0; background:rgba(20,14,30,.92); border-radius:14px; padding:8px; overflow-y:auto; display:none;}
.tile.exp .panel{display:block;}
.tile.exp .tbody > .zone, .tile.exp .tbody > .center{display:none;}
.panel .pbtns{display:flex; gap:6px; margin-bottom:6px;}
.panel .pbtns button{flex:1; padding:8px 6px; font-size:13px;}
.crow{display:flex; align-items:center; margin:4px 0;}
.crow .clabel{flex:1; font-size:14px;}
.crow .cval{min-width:30px; text-align:center; font-weight:700;}
.crow button{width:36px; height:36px; border-radius:50%; padding:0; font-size:18px;}
.chead{color:var(--c); font-size:13px; font-weight:600; margin-top:4px;}
canvas.cracks{position:absolute; inset:0; width:100%; height:100%; pointer-events:none;}
.flash{position:absolute; inset:0; pointer-events:none; opacity:0;}
.death{position:absolute; inset:0; display:none; flex-direction:column; align-items:center; justify-content:center;
  background:rgba(0,0,0,.64);}
.tile.dead .death{display:flex;}
.death .skull{font-size:64px; animation:beat 1.4s ease-in-out infinite;}
.death .dlabel{font-family:'Cinzel',serif; font-weight:700; color:#ff5252; font-size:20px;}
@keyframes beat{0%,100%{transform:scale(1);}50%{transform:scale(1.1);}}
.gear{position:absolute; left:50%; top:50%; transform:translate(-50%,-50%); z-index:5;
  width:54px; height:54px; border-radius:50%; background:var(--surface2); display:flex; align-items:center; justify-content:center; font-size:22px;}

/* tools/anim overlays */
.toolsheet h3{font-family:'Cinzel',serif;}
.tgrid{display:flex; gap:10px;} .tgrid button{flex:1;}
.animov{position:fixed; inset:0; z-index:60; background:rgba(0,0,0,.86); display:flex; align-items:center; justify-content:center;}
.stage{display:flex; flex-direction:column; align-items:center; gap:18px; text-align:center;}
.bignum{font-weight:800; font-size:128px; color:var(--primary);}
.bigtxt,.bigname{font-weight:800; font-size:46px; color:var(--primary); min-height:1em;}
.dlabel2{color:var(--muted); font-size:18px;}
.hint{color:rgba(179,169,201,.7); font-size:13px; display:none;}
.pop{animation:pop .5s cubic-bezier(.2,1.4,.4,1);}
@keyframes pop{0%{transform:scale(.5);}100%{transform:scale(1);}}
.coin{width:130px; height:130px; transform-style:preserve-3d; position:relative;}
.coin .face{position:absolute; inset:0; border-radius:50%; background:#e5b53a; border:5px solid #b8862a;
  display:flex; align-items:center; justify-content:center; -webkit-backface-visibility:hidden; backface-visibility:hidden;}
.coin .face.back{transform:rotateX(180deg);}

/* intro */
.intro{position:fixed; inset:0; z-index:70; overflow:hidden;}
.door{position:absolute; top:0; bottom:0; width:50%; background:#0b0712; border:1px solid #4e2a84; transition:transform .9s cubic-bezier(.4,0,.2,1);}
.door.l{left:0;} .door.r{right:0;}
.intro.open .door.l{transform:translateX(-100%);}
.intro.open .door.r{transform:translateX(100%);}
.introtxt{position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px;
  text-align:center; transition:opacity .5s; padding:24px;}
.introtxt .sw1{font-size:46px;}
.introtxt .t1{font-family:'Cinzel',serif; font-weight:700; font-size:30px; color:#ede7f6;}
.introtxt .t2{font-family:'Cinzel',serif; font-size:18px; color:var(--primary);}
.intro.fade .introtxt{opacity:0;}
</style>
</head>
<body>
<div id="bg"></div>
<canvas id="stars"></canvas>
<div id="vig"></div>
<div id="app"></div>
<script>
//// ---------- Datos ----------
const PALETTE=['#E53935','#FF7043','#FB8C00','#FFB300','#43A047','#26A69A','#00ACC1','#29B6F6','#1E88E5','#5C6BC0','#7E57C2','#AB47BC','#EC407A','#F06292','#78909C'];
const DEFAULTS=['#E53935','#1E88E5','#43A047','#FFB300','#8E24AA','#00ACC1'];
const PRESETS=[
  {id:'p1',name:'1 vs 1',players:2,life:20,cmd:false,poison:true,extra:false},
  {id:'p3',name:'Commander 3',players:3,life:40,cmd:true,poison:true,extra:false},
  {id:'p4',name:'Commander 4',players:4,life:40,cmd:true,poison:true,extra:false},
];
const app=document.getElementById('app');
const esc=s=>String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
function h(html){const t=document.createElement('template'); t.innerHTML=html.trim(); return t.content.firstElementChild;}
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}

//// ---------- Persistencia ----------
const LS=window.localStorage;
function loadModes(){try{return JSON.parse(LS.getItem('gtg_modes')||'[]');}catch(e){return [];}}
function saveModes(m){LS.setItem('gtg_modes',JSON.stringify(m));}
function loadProfiles(){try{return JSON.parse(LS.getItem('gtg_profiles')||'[]');}catch(e){return [];}}
function saveProfiles(p){LS.setItem('gtg_profiles',JSON.stringify(p));}

const state={customModes:loadModes(), profiles:loadProfiles(), pendingMode:null, seatNames:[], seatColors:[]};
let game=null;

//// ---------- Fondo de estrellas ----------
function drawStars(){
  const c=document.getElementById('stars'); const dpr=Math.min(2,window.devicePixelRatio||1);
  c.width=innerWidth*dpr; c.height=innerHeight*dpr; const ctx=c.getContext('2d'); ctx.scale(dpr,dpr);
  const rnd=mulberry32(73);
  for(let i=0;i<70;i++){ const x=rnd()*innerWidth, y=rnd()*innerHeight, r=rnd()*1.6+0.4;
    ctx.fillStyle='rgba(255,255,255,'+(rnd()*0.22+0.04)+')'; ctx.beginPath(); ctx.arc(x,y,r,0,7); ctx.fill(); }
}
addEventListener('resize',()=>{drawStars(); if(game) layoutTiles();});
drawStars();

//// ---------- Modales ----------
function modal(html,opts){opts=opts||{};
  const back=h('<div class="backdrop"></div>'); const card=h('<div class="card">'+html+'</div>');
  back.appendChild(card); document.body.appendChild(back);
  back.addEventListener('pointerdown',e=>{ if(e.target===back && opts.dismiss!==false) close(); });
  function close(){back.remove();}
  return {card,close};
}
function confirmDlg(msg,onYes){
  const m=modal('<h3>'+esc(msg)+'</h3><div class="dlgrow"><button class="ghost" data-no>Cancelar</button><button class="primary" data-yes>Sí</button></div>');
  m.card.querySelector('[data-yes]').onclick=()=>{m.close(); onYes();};
  m.card.querySelector('[data-no]').onclick=m.close;
}
function colorPicker(selected,onPick){
  const sw=PALETTE.map(c=>'<div class="swatch'+(c.toLowerCase()===String(selected).toLowerCase()?' sel':'')+'" data-c="'+c+'" style="background:'+c+'"></div>').join('');
  const m=modal('<h3>Color del jugador</h3><div class="swatches">'+sw+'</div><div class="dlgrow"><button class="ghost" data-close>Cerrar</button></div>');
  m.card.querySelectorAll('.swatch').forEach(s=>s.onclick=()=>{onPick(s.dataset.c); m.close();});
  m.card.querySelector('[data-close]').onclick=m.close;
}

//// ---------- Pantalla: Inicio ----------
function modeSummary(m){const ex=[]; if(m.cmd)ex.push('Daño cmdt.'); if(m.poison)ex.push('Veneno'); if(m.extra)ex.push('Contadores');
  return m.players+' jugadores · '+m.life+' vidas'+(ex.length?' · '+ex.join(' · '):'');}
function modeCard(m,custom){
  return '<div class="card2" data-modecard="'+m.id+'"><div class="modename">'+esc(m.name)+'</div><div class="modesub">'+modeSummary(m)+'</div>'
    +(custom?'<div class="rowbtns"><button class="ghost" data-editmode="'+m.id+'">Editar</button><button class="ghost" data-delmode="'+m.id+'">Borrar</button><div class="spacer"></div><button class="primary" data-playmode="'+m.id+'">Jugar</button></div>':'')
    +'</div>';
}
function getMode(id){return PRESETS.find(m=>m.id===id)||state.customModes.find(m=>m.id===id);}
function renderHome(){
  const presets=PRESETS.map(m=>modeCard(m)).join('');
  const customs=state.customModes.length?'<div class="sect">Tus modos</div>'+state.customModes.map(m=>modeCard(m,true)).join(''):'';
  const players=state.profiles.length?state.profiles.map(p=>
    '<div class="prow"><div class="dot" data-pcolor="'+esc(p.name)+'" style="background:'+p.color+'"></div><div class="pname">'+esc(p.name)+'</div><button class="ghost" data-pedit="'+esc(p.name)+'">Editar</button><button class="ghost" data-pdel="'+esc(p.name)+'">Borrar</button></div>'
  ).join(''):'<div class="muted">Aún no has guardado jugadores.</div>';
  app.innerHTML='<div class="screen">'
    +'<div class="htitle">Guille:</div><div class="htitle big">The Gathering</div>'
    +'<div class="sub">Contador de vidas para tus partidas de Magic</div>'
    +'<div class="sect">Modos rápidos</div>'+presets+customs
    +'<div class="addcard" data-newmode>➕  Crear modo personalizado</div>'
    +'<div class="sect">Jugadores guardados</div><div class="muted">Guárdalos para elegirlos al empezar, con su color.</div>'
    +'<div class="players">'+players+'</div>'
    +'<div class="addcard" data-addplayer>➕  Añadir jugador</div>'
    +'<div class="foot">Guille: The Gathering · app web</div></div>';
  // listeners
  app.querySelectorAll('[data-modecard]').forEach(c=>c.addEventListener('click',e=>{
    if(e.target.closest('button')) return; openSelect(getMode(c.dataset.modecard));
  }));
  app.querySelectorAll('[data-playmode]').forEach(b=>b.onclick=()=>openSelect(getMode(b.dataset.playmode)));
  app.querySelectorAll('[data-editmode]').forEach(b=>b.onclick=()=>openCustomEditor(getMode(b.dataset.editmode)));
  app.querySelectorAll('[data-delmode]').forEach(b=>b.onclick=()=>confirmDlg('¿Borrar modo?',()=>{state.customModes=state.customModes.filter(m=>m.id!==b.dataset.delmode); saveModes(state.customModes); renderHome();}));
  app.querySelector('[data-newmode]').onclick=()=>openCustomEditor(null);
  app.querySelector('[data-addplayer]').onclick=()=>addProfileDlg();
  app.querySelectorAll('[data-pedit]').forEach(b=>b.onclick=()=>editProfileDlg(b.dataset.pedit));
  app.querySelectorAll('[data-pdel]').forEach(b=>b.onclick=()=>{state.profiles=state.profiles.filter(p=>p.name!==b.dataset.pdel); saveProfiles(state.profiles); renderHome();});
  app.querySelectorAll('[data-pcolor]').forEach(d=>d.onclick=()=>{const name=d.dataset.pcolor; const pr=state.profiles.find(p=>p.name===name); colorPicker(pr.color,c=>{pr.color=c; saveProfiles(state.profiles); renderHome();});});
}
function addProfileDlg(){
  const m=modal('<h3>Nuevo jugador</h3><input type="text" maxlength="16" placeholder="Nombre" /><div class="dlgrow"><button class="ghost" data-no>Cancelar</button><button class="primary" data-yes>Añadir</button></div>');
  const inp=m.card.querySelector('input');
  m.card.querySelector('[data-yes]').onclick=()=>{const n=inp.value.trim(); if(n && !state.profiles.some(p=>p.name.toLowerCase()===n.toLowerCase())){state.profiles.push({name:n,color:DEFAULTS[state.profiles.length%6]}); saveProfiles(state.profiles);} m.close(); renderHome();};
  m.card.querySelector('[data-no]').onclick=m.close;
}
function editProfileDlg(name){
  const pr=state.profiles.find(p=>p.name===name); if(!pr) return;
  const m=modal('<h3>Editar jugador</h3><input type="text" maxlength="16" value="'+esc(pr.name)+'" /><div class="dlgrow"><button class="ghost" data-no>Cancelar</button><button class="primary" data-yes>Guardar</button></div>');
  const inp=m.card.querySelector('input');
  m.card.querySelector('[data-yes]').onclick=()=>{const n=inp.value.trim(); if(n){pr.name=n; saveProfiles(state.profiles);} m.close(); renderHome();};
  m.card.querySelector('[data-no]').onclick=m.close;
}

//// ---------- Editor de modo personalizado ----------
function openCustomEditor(existing){
  const st={name:existing?existing.name:'Mi modo', players:existing?existing.players:4, life:existing?existing.life:40,
    cmd:existing?existing.cmd:true, poison:existing?existing.poison:true, extra:existing?existing.extra:false};
  const m=modal(
    '<h3>'+(existing?'Editar modo':'Nuevo modo')+'</h3>'
    +'<input type="text" maxlength="20" value="'+esc(st.name)+'" id="cmname"/>'
    +'<div class="field"><label>Jugadores</label><button class="stepbtn" data-s="players" data-d="-1">−</button><div class="val" id="vplayers">'+st.players+'</div><button class="stepbtn" data-s="players" data-d="1">+</button></div>'
    +'<div class="field"><label>Vida inicial</label><button class="stepbtn" data-s="life" data-d="-1">−</button><div class="val" id="vlife">'+st.life+'</div><button class="stepbtn" data-s="life" data-d="1">+</button></div>'
    +'<div class="rowbtns"><button class="ghost" data-life="20">20</button><button class="ghost" data-life="30">30</button><button class="ghost" data-life="40">40</button></div>'
    +'<div class="toggle"><div><div class="t-title">Daño de comandante</div><div class="t-sub">Pierde con 21 de un rival</div></div><div class="sw'+(st.cmd?' on':'')+'" data-t="cmd"></div></div>'
    +'<div class="toggle"><div><div class="t-title">Veneno</div><div class="t-sub">Pierde con 10 contadores</div></div><div class="sw'+(st.poison?' on':'')+'" data-t="poison"></div></div>'
    +'<div class="toggle"><div><div class="t-title">Contadores extra</div><div class="t-sub">Energía y experiencia</div></div><div class="sw'+(st.extra?' on':'')+'" data-t="extra"></div></div>'
    +'<div class="dlgrow"><button class="ghost" data-no>Cancelar</button><button class="primary" data-yes>Guardar</button></div>');
  function upd(){m.card.querySelector('#vplayers').textContent=st.players; m.card.querySelector('#vlife').textContent=st.life;}
  m.card.querySelectorAll('[data-s]').forEach(b=>b.onclick=()=>{const k=b.dataset.s, d=+b.dataset.d;
    if(k==='players') st.players=Math.max(1,Math.min(6,st.players+d));
    if(k==='life') st.life=Math.max(1,Math.min(999,st.life+d)); upd();});
  m.card.querySelectorAll('[data-life]').forEach(b=>b.onclick=()=>{st.life=+b.dataset.life; upd();});
  m.card.querySelectorAll('[data-t]').forEach(s=>s.onclick=()=>{st[s.dataset.t]=!st[s.dataset.t]; s.classList.toggle('on');});
  m.card.querySelector('[data-yes]').onclick=()=>{st.name=(m.card.querySelector('#cmname').value.trim()||'Mi modo');
    const mode={id:existing?existing.id:('c'+Date.now()), name:st.name, players:st.players, life:st.life, cmd:st.cmd, poison:st.poison, extra:st.extra, custom:true};
    if(existing) state.customModes=state.customModes.map(x=>x.id===mode.id?mode:x); else state.customModes.push(mode);
    saveModes(state.customModes); m.close(); renderHome();};
  m.card.querySelector('[data-no]').onclick=m.close;
}

//// ---------- Pantalla: Selección de jugadores ----------
function openSelect(mode){
  state.pendingMode=mode; state.seatNames=[]; state.seatColors=[];
  for(let i=0;i<mode.players;i++){const pr=state.profiles[i]; state.seatNames.push(pr?pr.name:('Jugador '+(i+1))); state.seatColors.push(pr?pr.color:DEFAULTS[i%6]);}
  renderSelect();
}
function renderSelect(){
  const m=state.pendingMode;
  const seats=state.seatNames.map((n,i)=>'<div class="seat" data-seat="'+i+'"><div class="dot" data-seatcolor="'+i+'" style="background:'+state.seatColors[i]+'"></div><div class="seatinfo"><div class="muted">Asiento '+(i+1)+'</div><div class="seatname">'+esc(n)+'</div></div><div class="link">Cambiar</div></div>').join('');
  app.innerHTML='<div class="screen"><div class="htitle big">'+esc(m.name)+'</div><div class="sub">Elige quién juega en cada asiento</div>'
    +seats+'<button class="primary wide" data-play>Jugar</button><button class="ghost wide" data-cancel>Cancelar</button></div>';
  app.querySelectorAll('[data-seat]').forEach(s=>s.addEventListener('click',e=>{ if(e.target.closest('[data-seatcolor]')) return; seatNameDlg(+s.dataset.seat); }));
  app.querySelectorAll('[data-seatcolor]').forEach(d=>d.addEventListener('click',e=>{e.stopPropagation(); const i=+d.dataset.seatcolor; colorPicker(state.seatColors[i],c=>{state.seatColors[i]=c; renderSelect();});}));
  app.querySelector('[data-play]').onclick=()=>startGame(m,state.seatNames.slice(),state.seatColors.slice());
  app.querySelector('[data-cancel]').onclick=renderHome;
}
function seatNameDlg(i){
  const list=state.profiles.length?state.profiles.map(p=>'<div class="pickrow" data-prof="'+esc(p.name)+'"><div class="dot" style="background:'+p.color+'"></div><div class="pname">'+esc(p.name)+'</div></div>').join(''):'<div class="muted">Aún no hay jugadores guardados.</div>';
  const m=modal('<h3>Asiento '+(i+1)+'</h3>'+list+'<hr><div class="pickrow" data-default><div class="pname">Por defecto: Jugador '+(i+1)+'</div></div><hr><input type="text" maxlength="16" placeholder="Jugador nuevo" /><div class="dlgrow"><button class="ghost" data-close>Cerrar</button><button class="primary" data-add>Añadir y usar</button></div>');
  m.card.querySelectorAll('[data-prof]').forEach(r=>r.onclick=()=>{const pr=state.profiles.find(p=>p.name===r.dataset.prof); state.seatNames[i]=pr.name; state.seatColors[i]=pr.color; m.close(); renderSelect();});
  m.card.querySelector('[data-default]').onclick=()=>{state.seatNames[i]='Jugador '+(i+1); state.seatColors[i]=DEFAULTS[i%6]; m.close(); renderSelect();};
  const inp=m.card.querySelector('input');
  m.card.querySelector('[data-add]').onclick=()=>{const n=inp.value.trim(); if(!n) return; if(!state.profiles.some(p=>p.name.toLowerCase()===n.toLowerCase())){state.profiles.push({name:n,color:DEFAULTS[state.profiles.length%6]}); saveProfiles(state.profiles);} state.seatNames[i]=n; m.close(); renderSelect();};
  m.card.querySelector('[data-close]').onclick=m.close;
}

//// ---------- Juego ----------
function startGame(mode,names,colors){
  game={mode, startingPlayer:null, history:[], players:[]};
  for(let i=0;i<mode.players;i++){
    game.players.push({i, name:(names[i]&&names[i].trim())||('Jugador '+(i+1)), color:colors[i]||DEFAULTS[i%6],
      life:mode.life, poison:0, energy:0, exp:0, cmd:{}, cracks:genCracks((i+1)*101), recent:0, _recentT:null});
  }
  renderGame();
}
function goHome(){ if(game&&game._wake){try{game._wake.release();}catch(e){} game._wake=null;} game=null; renderHome(); }

function snapshot(){return game.players.map(p=>({life:p.life,poison:p.poison,energy:p.energy,exp:p.exp,cmd:Object.assign({},p.cmd)}));}
function pushHist(){game.history.push(snapshot()); if(game.history.length>200) game.history.shift();}
function undo(){const s=game.history.pop(); if(!s)return; s.forEach((d,i)=>{const p=game.players[i]; p.life=d.life; p.poison=d.poison; p.energy=d.energy; p.exp=d.exp; p.cmd=Object.assign({},d.cmd);}); game.players.forEach(p=>updateTile(p));}
function isLoser(p){const m=game.mode; if(p.life<=0)return true; if(m.poison&&p.poison>=10)return true; if(m.cmd){for(const k in p.cmd){if(p.cmd[k]>=21)return true;}} return false;}

function changeLife(p,d){pushHist(); p.life+=d; bump(p,d); updateTile(p,d<0?'#E53935':'#43A047');}
function changeCounter(p,key,d){pushHist(); p[key]=Math.max(0,p[key]+d); updateTile(p);}
function changeCmd(p,from,d){pushHist(); const cur=p.cmd[from]||0; const next=Math.max(0,cur+d); const applied=next-cur; p.cmd[from]=next; p.life-=applied; if(applied) bump(p,-applied); updateTile(p, applied>0?'#E53935':(applied<0?'#43A047':null));}
function resetGame(){pushHist(); game.players.forEach(p=>{p.life=game.mode.life; p.poison=0; p.energy=0; p.exp=0; p.cmd={};}); game.startingPlayer=null; game.players.forEach(p=>updateTile(p)); updateCrowns();}

function bump(p,d){ p.recent+=d; clearTimeout(p._recentT); p._recentT=setTimeout(()=>{p.recent=0; if(p._delta)p._delta.textContent='';},1300);
  if(p._delta) p._delta.textContent=p.recent>0?('+'+p.recent):(p.recent<0?(''+p.recent):''); }

//// grietas
function genCracks(seed){const rnd=mulberry32(seed); const cx=0.5+(rnd()-0.5)*0.12, cy=0.46+(rnd()-0.5)*0.12; const cr=[]; const mains=7+Math.floor(rnd()*3);
  for(let i=0;i<mains;i++){let ang=(2*Math.PI/mains)*i+(rnd()-0.5)*0.5; const pts=[[cx,cy]]; let px=cx,py=cy; const segs=5+Math.floor(rnd()*3); const sl=0.16+rnd()*0.06;
    for(let s=0;s<segs;s++){ang+=(rnd()-0.5)*0.6; px+=Math.cos(ang)*sl; py+=Math.sin(ang)*sl; pts.push([px,py]);}
    cr.push({pts,appearAt:(i/mains)*0.45});
    if(rnd()<0.7&&pts.length>3){const bi=2+Math.floor(rnd()*(pts.length-2)); let bx=pts[bi][0],by=pts[bi][1]; let bang=ang+(rnd()<.5?1:-1)*(0.6+rnd()*0.5); const bp=[[bx,by]]; const bs=2+Math.floor(rnd()*2);
      for(let s=0;s<bs;s++){bang+=(rnd()-0.5)*0.5; bx+=Math.cos(bang)*sl*0.8; by+=Math.sin(bang)*sl*0.8; bp.push([bx,by]);} cr.push({pts:bp,appearAt:0.45+rnd()*0.4});}}
  return cr;}
function drawCracks(p){const cv=p._cracks; if(!cv)return; const dpr=Math.min(2,window.devicePixelRatio||1);
  const w=cv.clientWidth, hh=cv.clientHeight; if(!w||!hh)return; cv.width=w*dpr; cv.height=hh*dpr; const ctx=cv.getContext('2d'); ctx.scale(dpr,dpr); ctx.clearRect(0,0,w,hh);
  const dmg=Math.max(0,Math.min(1,1-p.life/game.mode.life)); if(dmg<=0.001)return; const sw=Math.min(w,hh)*0.010;
  ctx.lineCap='round';
  p.cracks.forEach(cr=>{ if(dmg<=cr.appearAt)return; const grow=Math.min(1,(dmg-cr.appearAt)/(1-cr.appearAt)); const total=cr.pts.length-1; const ds=grow*total;
    for(let seg=0; seg<total && seg<ds; seg++){const a=cr.pts[seg], b=cr.pts[seg+1]; const f=Math.min(1,ds-seg);
      const ax=a[0]*w, ay=a[1]*hh, bx=ax+(b[0]*w-ax)*f, by=ay+(b[1]*hh-ay)*f;
      ctx.strokeStyle='rgba(0,0,0,'+(0.12+0.30*dmg)+')'; ctx.lineWidth=sw*1.8; ctx.beginPath(); ctx.moveTo(ax,ay); ctx.lineTo(bx,by); ctx.stroke();
      ctx.strokeStyle='rgba(255,255,255,'+(0.15+0.45*dmg)+')'; ctx.lineWidth=sw; ctx.beginPath(); ctx.moveTo(ax,ay); ctx.lineTo(bx,by); ctx.stroke();}});}

function flashTile(p,color){const f=p._flash; if(!f)return; f.style.transition='none'; f.style.background=color; f.style.opacity='0.5'; f.offsetHeight; f.style.transition='opacity .55s'; f.style.opacity='0';}

function updateTile(p,flashColor){
  p._life.textContent=p.life;
  drawCracks(p);
  const dead=isLoser(p); p._tile.classList.toggle('dead',dead);
  // chips
  const chips=[]; const m=game.mode; if(m.poison)chips.push('☠ '+p.poison); if(m.extra){chips.push('⚡ '+p.energy); chips.push('✦ '+p.exp);} if(m.cmd){let mx=0; for(const k in p.cmd)mx=Math.max(mx,p.cmd[k]); chips.push('⚔ '+mx);}
  p._chips.innerHTML=chips.map(c=>'<span>'+c+'</span>').join('');
  if(p._tile.classList.contains('exp')) renderPanel(p);
  if(flashColor) flashTile(p,flashColor);
}
function updateCrowns(){game.players.forEach(p=>{p._crown.textContent=(game.startingPlayer===p.i)?'👑':'';});}

function renderPanel(p){const m=game.mode; let html='<div class="pbtns"><button data-rename>✏️ Nombre</button><button data-color>🎨 Color</button></div>';
  if(m.poison) html+=counterRow('☠ Veneno','poison',p.poison,p.poison>=10);
  if(m.extra){html+=counterRow('⚡ Energía','energy',p.energy,false); html+=counterRow('✦ Experiencia','exp',p.exp,false);}
  if(m.cmd){html+='<div class="chead">⚔ Daño recibido (21 = pierdes)</div>'; game.players.filter(o=>o.i!==p.i).forEach(o=>{const v=p.cmd[o.i]||0; html+='<div class="crow"><div class="clabel" style="color:'+(v>=21?'#ff6b6b':'inherit')+'">De '+esc(o.name)+'</div><button data-cmd="'+o.i+'" data-d="-1">−</button><div class="cval" style="color:'+(v>=21?'#ff6b6b':'inherit')+'">'+v+'</div><button data-cmd="'+o.i+'" data-d="1">+</button></div>';});}
  p._panel.innerHTML=html;
  p._panel.querySelector('[data-rename]').onclick=()=>renameDlg(p);
  p._panel.querySelector('[data-color]').onclick=()=>colorPicker(p.color,c=>{p.color=c; applyColor(p);});
  p._panel.querySelectorAll('[data-counter]').forEach(b=>b.onclick=()=>changeCounter(p,b.dataset.counter,+b.dataset.d));
  p._panel.querySelectorAll('[data-cmd]').forEach(b=>b.onclick=()=>changeCmd(p,+b.dataset.cmd,+b.dataset.d));
}
function counterRow(label,key,val,warn){const col=warn?'#ff6b6b':'inherit';
  return '<div class="crow"><div class="clabel" style="color:'+col+'">'+label+'</div><button data-counter="'+key+'" data-d="-1">−</button><div class="cval" style="color:'+col+'">'+val+'</div><button data-counter="'+key+'" data-d="1">+</button></div>';}
function renameDlg(p){const m=modal('<h3>Nombre del jugador</h3><input type="text" maxlength="16" value="'+esc(p.name)+'"/><div class="dlgrow"><button class="ghost" data-no>Cancelar</button><button class="primary" data-yes>Guardar</button></div>');
  const inp=m.card.querySelector('input'); m.card.querySelector('[data-yes]').onclick=()=>{const n=inp.value.trim(); if(n){p.name=n; p._name.textContent=n;} m.close();}; m.card.querySelector('[data-no]').onclick=m.close;}
function applyColor(p){p._tile.style.setProperty('--c',p.color); p._tile.style.borderColor=hexA(p.color,.55); p._tile.style.background=hexA(p.color,.15);
  p._name.style.color=hexA(p.color,.6); p._minus.style.color=hexA(p.color,.5); p._plus.style.color=hexA(p.color,.5); p._dots.style.color=p.color;}
function hexA(hex,a){const n=parseInt(hex.slice(1),16); return 'rgba('+((n>>16)&255)+','+((n>>8)&255)+','+(n&255)+','+a+')';}

//// hold-repeat
function attachHold(el,fn){let active=false,t1,t2;
  const start=e=>{e.preventDefault(); active=true; fn(); t1=setTimeout(()=>{let d=110; const tick=()=>{if(!active)return; fn(); d=Math.max(45,d-8); t2=setTimeout(tick,d);}; t2=setTimeout(tick,d);},330);};
  const stop=()=>{active=false; clearTimeout(t1); clearTimeout(t2);};
  el.addEventListener('pointerdown',start); el.addEventListener('pointerup',stop); el.addEventListener('pointercancel',stop); el.addEventListener('pointerleave',stop);}

function renderGame(){
  const n=game.players.length;
  const board=h('<div class="board"></div>');
  let rows;
  if(n===1) rows=[[0]]; else {const topN=Math.ceil(n/2); rows=[[],[]]; game.players.forEach((p,i)=>{ (i<topN?rows[0]:rows[1]).push(i); });}
  rows.forEach((row,ri)=>{ if(!row.length)return; const brow=h('<div class="brow"></div>');
    row.forEach(idx=>{const p=game.players[idx]; const rot=(rows.length>1 && ri===0);
      const tile=buildTile(p,rot); brow.appendChild(tile);});
    board.appendChild(brow);});
  app.innerHTML=''; app.appendChild(board);
  const gear=h('<div class="gear">⚙</div>'); gear.onclick=openTools; app.appendChild(gear);
  layoutTiles(); game.players.forEach(p=>{updateTile(p); applyColor(p);}); updateCrowns();
  // wake lock
  if('wakeLock' in navigator){navigator.wakeLock.request('screen').then(w=>{game._wake=w;}).catch(()=>{});}
  runIntro();
}
function buildTile(p,rot){
  const tile=h('<div class="tile'+(rot?' rot':'')+'">'
    +'<div class="tileInner"><div class="thead"><span class="crown"></span><span class="dots">⋯</span></div>'
    +'<div class="tbody"><div class="zone minus"><span class="sign">−</span></div><div class="zone plus"><span class="sign">+</span></div>'
    +'<div class="center"><div class="life">0</div><div class="delta"></div><div class="pname"></div></div>'
    +'<div class="panel"></div></div><div class="chips"></div></div>'
    +'<canvas class="cracks"></canvas><div class="flash"></div>'
    +'<div class="death"><div class="skull">💀</div><div class="dlabel">DERROTADO</div></div></div>');
  p._tile=tile; p._life=tile.querySelector('.life'); p._delta=tile.querySelector('.delta'); p._name=tile.querySelector('.pname');
  p._minus=tile.querySelector('.zone.minus'); p._plus=tile.querySelector('.zone.plus'); p._chips=tile.querySelector('.chips');
  p._panel=tile.querySelector('.panel'); p._cracks=tile.querySelector('.cracks'); p._flash=tile.querySelector('.flash');
  p._crown=tile.querySelector('.crown'); p._dots=tile.querySelector('.dots');
  attachHold(p._minus,()=>changeLife(p,-1)); attachHold(p._plus,()=>changeLife(p,+1));
  p._dots.onclick=()=>{const open=tile.classList.toggle('exp'); p._dots.textContent=open?'✕':'⋯'; if(open)renderPanel(p);};
  p._chips.onclick=()=>{tile.classList.add('exp'); p._dots.textContent='✕'; renderPanel(p);};
  return tile;
}
function layoutTiles(){ game&&game.players.forEach(p=>drawCracks(p)); }

//// ---------- Herramientas ----------
function openTools(){
  const m=modal('<div class="toolsheet"><h3>Herramientas</h3>'
    +'<div class="tgrid"><button data-a="d20">🎲 d20</button><button data-a="d6">🎲 d6</button></div>'
    +'<button class="wide" data-a="coin">🪙 Cara o cruz</button><button class="wide" data-a="start">👑 ¿Quién empieza?</button>'
    +'<hr><button class="wide" data-a="undo">↩️ Deshacer</button><button class="wide" data-a="reset">🔄 Reiniciar vidas</button>'
    +'<button class="wide" data-a="exit">🚪 Salir al menú</button></div>');
  m.card.querySelectorAll('button[data-a]').forEach(b=>b.onclick=()=>{const a=b.dataset.a;
    if(a==='undo'){undo();}
    else if(a==='reset'){confirmDlg('¿Reiniciar vidas?',()=>{resetGame(); m.close();}); }
    else if(a==='exit'){confirmDlg('¿Salir de la partida?',()=>{m.close(); goHome();}); }
    else {m.close(); showAnim(a);}});
}
function sunSVG(){let lines=''; for(let i=0;i<8;i++){const a=Math.PI/4*i; lines+='<line x1="'+(50+24*Math.cos(a)).toFixed(1)+'" y1="'+(50+24*Math.sin(a)).toFixed(1)+'" x2="'+(50+42*Math.cos(a)).toFixed(1)+'" y2="'+(50+42*Math.sin(a)).toFixed(1)+'"/>';}
  return '<svg width="64" height="64" viewBox="0 0 100 100" stroke="#6b4a18" stroke-width="9" stroke-linecap="round"><circle cx="50" cy="50" r="16" fill="#6b4a18" stroke="none"/>'+lines+'</svg>';}
function crossSVG(){return '<svg width="64" height="64" viewBox="0 0 100 100" fill="#6b4a18"><rect x="42" y="16" width="16" height="68" rx="8"/><rect x="16" y="42" width="68" height="16" rx="8"/></svg>';}
function showAnim(kind){
  const ov=h('<div class="animov"></div>'); document.body.appendChild(ov); let done=false;
  const finish=()=>{done=true; const hint=ov.querySelector('.hint'); if(hint)hint.style.display='block';};
  ov.addEventListener('pointerdown',()=>{if(done)ov.remove();});
  if(kind==='d20'||kind==='d6'){const sides=kind==='d20'?20:6;
    ov.innerHTML='<div class="stage"><div class="dlabel2">'+kind+'</div><div class="bignum">?</div><div class="hint">toca para continuar</div></div>';
    const num=ov.querySelector('.bignum'); const final=1+Math.floor(Math.random()*sides); let d=24,nn=0;
    const tick=()=>{if(nn>=13){num.textContent=final; num.classList.add('pop'); finish(); return;} num.textContent=1+Math.floor(Math.random()*sides); nn++; d+=11; setTimeout(tick,d);}; tick();
  } else if(kind==='coin'){const isCara=Math.random()<0.5;
    ov.innerHTML='<div class="stage"><div class="coin"><div class="face front">'+sunSVG()+'</div><div class="face back">'+crossSVG()+'</div></div><div class="bigtxt"></div><div class="hint">toca para continuar</div></div>';
    const coin=ov.querySelector('.coin'), txt=ov.querySelector('.bigtxt');
    requestAnimationFrame(()=>{coin.style.transition='transform 1.2s cubic-bezier(.2,.85,.2,1)'; coin.style.transform='rotateX('+(360*5+(isCara?0:180))+'deg)';});
    setTimeout(()=>{txt.textContent=isCara?'Cara':'Cruz'; txt.classList.add('pop'); finish();},1250);
  } else if(kind==='start'){const n=game.players.length; const final=Math.floor(Math.random()*n); game.startingPlayer=final; updateCrowns();
    ov.innerHTML='<div class="stage"><div class="dlabel2">Eligiendo…</div><div class="bigname"></div><div class="hint">toca para continuar</div></div>';
    const nm=ov.querySelector('.bigname'), lbl=ov.querySelector('.dlabel2'); const steps=final+1+2*n; let d=60,i=0;
    const tick=()=>{if(i>=steps){const p=game.players[final]; nm.textContent=p.name; nm.style.color=p.color; nm.classList.add('pop'); lbl.textContent='👑 Empieza'; finish(); return;} const p=game.players[i%n]; nm.textContent=p.name; nm.style.color=p.color; i++; d+=(i>=steps-5?55:8); setTimeout(tick,d);}; tick();
  }
}

//// ---------- Intro + máquina de escribir ----------
function runIntro(){
  const intro=h('<div class="intro"><div class="door l"></div><div class="door r"></div><div class="introtxt"><div class="sw1">⚔</div><div class="t1">¡Bienvenidos a la arena!</div><div class="t2">'+esc(game.mode.name)+'</div></div></div>');
  document.body.appendChild(intro); let finished=false;
  const finish=()=>{if(finished)return; finished=true; intro.remove(); typewriter();};
  intro.addEventListener('pointerdown',finish);
  requestAnimationFrame(()=>{ setTimeout(()=>{ intro.classList.add('open','fade'); setTimeout(finish,1000); },800); });
}
function typewriter(){
  game.players.forEach(p=>{ const full=p.name; p._name.textContent='';
    setTimeout(()=>{ let i=0; const step=()=>{ if(!game||p._name!==p._tile.querySelector('.pname'))return; if(i>full.length){p._name.textContent=full; return;} p._name.textContent=full.slice(0,i)+(i<full.length?'▌':''); i++; setTimeout(step,60); }; step(); }, p.i*130);
  });
}

//// ---------- Arranque ----------
renderHome();
if('serviceWorker' in navigator && location.protocol==='https:'){ navigator.serviceWorker.register('sw.js').catch(()=>{}); }
</script>
